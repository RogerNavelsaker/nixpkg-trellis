name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run nix-update
        run: nix shell nixpkgs#bun -c sh -c 'bun install && bun run sync:source'

      - name: Automatic sync
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync upstream using nix-update"
