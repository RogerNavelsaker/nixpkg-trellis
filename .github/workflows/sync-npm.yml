name: Sync npm Source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-npm-source:
    # Keep this workflow disabled until Trellis is released on npm under @os-eco by jayminwest.
    if: ${{ false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@v19

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Sync package from npm source
        run: bun run sync:npm
